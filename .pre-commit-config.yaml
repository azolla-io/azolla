repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
      - id: python-ruff-check
        name: ruff check
        entry: bash -c 'cd clients/python && venv/bin/ruff check src tests'
        language: system
        files: ^clients/python/.*\.py$
        exclude: ^clients/python/src/azolla/_grpc/.*\.py$
        pass_filenames: false
      - id: python-black-check
        name: black check
        entry: bash -c 'cd clients/python && venv/bin/black --check src tests'
        language: system
        files: ^clients/python/.*\.py$
        exclude: ^clients/python/src/azolla/_grpc/.*\.py$
        pass_filenames: false
      - id: python-mypy-check
        name: mypy check
        entry: bash -c 'cd clients/python && venv/bin/mypy src'
        language: system
        files: ^clients/python/src/.*\.py$
        exclude: ^clients/python/src/azolla/_grpc/.*\.py$
        pass_filenames: false
